name: Guard generated extension catalog

on:
  pull_request:
    paths:
      - "extensions/registry/catalog.v1.json"
  push:
    paths:
      - "extensions/registry/catalog.v1.json"

jobs:
  block-manual-catalog-edits:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Explain generated catalog ownership
        shell: pwsh
        run: |
          throw "extensions/registry/catalog.v1.json is generated by the publish workflow. Edit package manifests/actions/platform files instead."
