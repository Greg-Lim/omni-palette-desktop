# Curated Windows shortcuts from:
# https://support.microsoft.com/en-us/windows/keyboard-shortcuts-in-windows-dcc61a57-8ff0-cffe-9796-cb9706c75eec

version = 2
platform = "windows"

[app]
id = "windows"
name = "Windows"
process_name = "explorer.exe"
default_focus_state = "global"
default_tags = ["windows", "system", "os"]

[actions]

[actions.open_file_explorer]
name = "Open File Explorer"
action_priority = "high"
cmd = { mods = ["win"], key = "KeyE" }

[actions.open_settings]
name = "Open Settings"
action_priority = "high"
cmd = { mods = ["win"], key = "KeyI" }

[actions.lock_pc]
name = "Lock PC"
action_priority = "high"
cmd = { mods = ["win"], key = "KeyL" }

[actions.open_run]
name = "Open Run"
action_priority = "high"
cmd = { mods = ["win"], key = "KeyR" }

[actions.open_search]
name = "Open Search"
action_priority = "high"
cmd = { mods = ["win"], key = "KeyS" }

[actions.open_quick_link_menu]
name = "Open Quick Link menu"
action_priority = "medium"
cmd = { mods = ["win"], key = "KeyX" }

[actions.show_hide_desktop]
name = "Show/hide desktop"
action_priority = "medium"
cmd = { mods = ["win"], key = "KeyD" }

[actions.open_task_view]
name = "Open Task View"
action_priority = "medium"
cmd = { mods = ["win"], key = "Tab" }

[actions.open_clipboard_history]
name = "Open Clipboard History"
action_priority = "high"
cmd = { mods = ["win"], key = "KeyV" }

[actions.open_action_center]
name = "Open Action Center"
action_priority = "low"
cmd = { mods = ["win"], key = "KeyA" }

[actions.open_project_settings]
name = "Open Project Settings"
action_priority = "suppressed"
cmd = { mods = ["win"], key = "KeyP" }

[actions.screen_snip]
name = "Screen snip"
action_priority = "high"
cmd = { mods = ["win", "shift"], key = "KeyS" }

[actions.save_screenshot]
name = "Save screenshot"
action_priority = "medium"
cmd = { mods = ["win"], key = "PrintScreen" }

[actions.open_accessibility]
