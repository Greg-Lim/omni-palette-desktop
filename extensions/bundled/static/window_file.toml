version = 2
platform = "windows"

[app]
id = "file_system"
name = "File System"
process_name = "Explorer.EXE"
default_focus_state = "focused"

[actions]

[actions.new_tab]
name = "New tab"
focus_state = "focused"
cmd = { mods = ["ctrl"], key = "T" }

[actions.close_tab]
name = "Close tab"
focus_state = "focused"
cmd = { mods = ["ctrl"], key = "W" }

[actions.rename_item]
name = "Rename item"
focus_state = "focused"
cmd = { mods = ["fn"], key = "F2" }
