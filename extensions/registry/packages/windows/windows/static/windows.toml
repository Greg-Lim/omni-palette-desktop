version = 3
platform = "windows"
process_name = "explorer.exe"

[actions]

[actions.open_file_explorer]
cmd = { mods = ["win"], key = "KeyE" }

[actions.open_settings]
cmd = { mods = ["win"], key = "KeyI" }

[actions.lock_pc]
cmd = { mods = ["win"], key = "KeyL" }

[actions.open_run]
cmd = { mods = ["win"], key = "KeyR" }

[actions.open_search]
cmd = { mods = ["win"], key = "KeyS" }

[actions.open_quick_link_menu]
cmd = { mods = ["win"], key = "KeyX" }

[actions.show_hide_desktop]
cmd = { mods = ["win"], key = "KeyD" }

[actions.open_task_view]
cmd = { mods = ["win"], key = "Tab" }

[actions.open_clipboard_history]
cmd = { mods = ["win"], key = "KeyV" }

[actions.open_action_center]
cmd = { mods = ["win"], key = "KeyA" }

[actions.open_project_settings]
cmd = { mods = ["win"], key = "KeyP" }

[actions.screen_snip]
cmd = { mods = ["win", "shift"], key = "KeyS" }

[actions.save_screenshot]
cmd = { mods = ["win"], key = "PrintScreen" }

[actions.open_accessibility]
cmd = { mods = ["win"], key = "KeyU" }

[actions.snap_window_left]
cmd = { mods = ["win"], key = "LeftArrow" }

[actions.snap_window_right]
cmd = { mods = ["win"], key = "RightArrow" }

[actions.maximize_window]
cmd = { mods = ["win"], key = "UpArrow" }

[actions.minimize_window]
cmd = { mods = ["win"], key = "DownArrow" }

[actions.open_emoji_panel]
cmd = { mods = ["win"], key = "Period" }

[actions.open_voice_typing]
cmd = { mods = ["win"], key = "KeyH" }

[actions.open_widgets]
cmd = { mods = ["win"], key = "KeyW" }

[actions.open_cast]
cmd = { mods = ["win"], key = "KeyK" }

[actions.open_game_bar]
cmd = { mods = ["win"], key = "KeyG" }

[actions.minimize_all_windows]
cmd = { mods = ["win"], key = "KeyM" }

[actions.restore_minimized_windows]
cmd = { mods = ["win", "shift"], key = "KeyM" }

[actions.move_window_left_monitor]
cmd = { mods = ["win", "shift"], key = "LeftArrow" }

[actions.move_window_right_monitor]
cmd = { mods = ["win", "shift"], key = "RightArrow" }

[actions.snap_window_top]
cmd = { mods = ["win", "alt"], key = "UpArrow" }

[actions.snap_window_bottom]
cmd = { mods = ["win", "alt"], key = "DownArrow" }

[actions.stretch_window_vertical]
cmd = { mods = ["win", "shift"], key = "UpArrow" }

[actions.create_virtual_desktop]
cmd = { mods = ["win", "ctrl"], key = "KeyD" }

[actions.next_virtual_desktop]
cmd = { mods = ["win", "ctrl"], key = "RightArrow" }

[actions.previous_virtual_desktop]
cmd = { mods = ["win", "ctrl"], key = "LeftArrow" }

[actions.close_virtual_desktop]
cmd = { mods = ["win", "ctrl"], key = "F4" }

[actions.open_quick_assist]
cmd = { mods = ["win", "ctrl"], key = "KeyQ" }

[actions.open_sound_output]
cmd = { mods = ["win", "ctrl"], key = "KeyV" }

[actions.open_system_about]
cmd = { mods = ["win"], key = "Pause" }

[actions.record_screen_region]
cmd = { mods = ["win", "shift"], key = "KeyR" }

[actions.toggle_hdr]
cmd = { mods = ["win", "alt"], key = "KeyB" }

[actions.toggle_color_filters]
cmd = { mods = ["win", "ctrl"], key = "KeyC" }

[actions.open_narrator]
cmd = { mods = ["win", "ctrl"], key = "Enter" }

[actions.magnifier_zoom_in]
cmd = { mods = ["win"], key = "Equal" }

[actions.magnifier_zoom_out]
cmd = { mods = ["win"], key = "Minus" }

[actions.close_magnifier]
cmd = { mods = ["win"], key = "Escape" }

[actions.open_feedback_hub]
cmd = { mods = ["win"], key = "KeyF" }

[actions.open_recall]
cmd = { mods = ["win"], key = "KeyJ" }

[actions.open_ime_reconversion]
cmd = { mods = ["win"], key = "Slash" }

[actions.switch_input_language]
cmd = { mods = ["win"], key = "Space" }

[actions.previous_input_language]
cmd = { mods = ["win", "shift"], key = "Space" }

[actions.cycle_notifications]
cmd = { mods = ["win", "shift"], key = "KeyV" }

[actions.uwp_full_screen]
cmd = { mods = ["win", "shift"], key = "Enter" }

[actions.mixed_reality_input]
cmd = { mods = ["win"], key = "KeyY" }

[actions.open_snap_layouts]
cmd = { mods = ["win"], key = "KeyZ" }
