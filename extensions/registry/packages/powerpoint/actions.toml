schema_version = 1

[app]
default_focus_state = "focused"
default_tags = ["powerpoint", "presentation", "slides", "office"]

[actions]

[actions.new_slide]
name = "New slide"
priority = "high"

[actions.new_presentation]
name = "New presentation"
priority = "low"
tags = ["file"]

[actions.open_presentation]
name = "Open presentation"
priority = "medium"
tags = ["file"]

[actions.save_presentation]
name = "Save presentation"
priority = "high"
tags = ["file"]

[actions.save_presentation_as]
name = "Save presentation as"
priority = "medium"
tags = ["file"]

[actions.print_presentation]
name = "Print presentation"
priority = "low"
tags = ["file"]

[actions.start_slideshow]
name = "Start slideshow from beginning"
priority = "high"

[actions.start_slideshow_from_current]
name = "Start slideshow from current slide"
priority = "high"

[actions.open_draw_tab]
name = "Open Draw tab"
priority = "medium"
tags = ["draw", "ink", "ribbon"]

[actions.open_help_tab]
name = "Open Help tab"
priority = "suppressed"
tags = ["help", "ribbon"]

[actions.change_font_size_from_ribbon]
name = "Change font size from ribbon"
priority = "medium"
tags = ["format", "font", "ribbon"]

[actions.change_font_size_from_ribbon.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.open_zoom_dialog]
name = "Open Zoom dialog"
priority = "low"
tags = ["view", "zoom", "ribbon"]

[actions.print_full_page_slides]
name = "Print full page slides"
priority = "suppressed"
tags = ["print", "ribbon"]

[actions.select_theme]
name = "Select theme"
priority = "medium"
tags = ["design", "theme", "ribbon"]

[actions.select_slide_layout]
name = "Select slide layout"
priority = "high"
tags = ["slide", "layout", "ribbon"]

[actions.toggle_notes_pane]
name = "Show or hide Notes pane"
priority = "medium"
tags = ["view", "notes", "ribbon"]

[actions.open_clipboard_pane]
name = "Open Clipboard pane"
priority = "low"
tags = ["clipboard", "ribbon"]

[actions.insert_text_box]
name = "Insert text box"
priority = "high"
tags = ["insert", "text", "ribbon"]

[actions.insert_embedded_object]
name = "Insert embedded object"
priority = "suppressed"
tags = ["insert", "object", "ribbon"]

[actions.insert_wordart]
name = "Insert WordArt"
priority = "suppressed"
tags = ["insert", "text", "wordart", "ribbon"]

[actions.insert_picture_from_device]
name = "Insert picture from device"
priority = "medium"
tags = ["insert", "picture", "image", "ribbon"]

[actions.insert_shape]
name = "Insert shape"
priority = "high"
tags = ["insert", "shape", "ribbon"]

[actions.open_selection_pane]
name = "Open Selection pane"
priority = "medium"
tags = ["selection", "pane", "ribbon"]

[actions.next_slide]
name = "Go to next slide"
priority = "medium"
tags = ["navigate"]

[actions.previous_slide]
name = "Go to previous slide"
priority = "medium"
tags = ["navigate"]

[actions.zoom_out]
name = "Zoom out"
priority = "low"
tags = ["view", "zoom"]

[actions.zoom_to_fit]
name = "Zoom to fit"
priority = "medium"
tags = ["view", "zoom"]

[actions.duplicate_slide]
name = "Duplicate selected slide"
priority = "high"
tags = ["duplicate", "copy"]

[actions.duplicate_slide.when]
any = ["ppt.selection.slide"]

[actions.duplicate_object]
name = "Duplicate selected object"
priority = "high"
tags = ["duplicate", "copy", "shape", "image"]

[actions.duplicate_object.when]
any = ["ppt.selection.shape", "ppt.selection.picture"]

[actions.cut_selection]
name = "Cut selected text, object, or slide"
priority = "medium"
tags = ["clipboard"]

[actions.cut_selection.when]
any = ["ppt.selection.text", "ppt.selection.shape", "ppt.selection.picture", "ppt.selection.slide", "ui.text_input"]

[actions.copy_selection]
name = "Copy selected text, object, or slide"
priority = "medium"
tags = ["clipboard"]

[actions.copy_selection.when]
any = ["ppt.selection.text", "ppt.selection.shape", "ppt.selection.picture", "ppt.selection.slide", "ui.text_input"]

[actions.paste]
name = "Paste"
priority = "high"
tags = ["clipboard"]

[actions.copy_formatting]
name = "Copy selected formatting"
priority = "medium"
tags = ["clipboard", "format"]

[actions.copy_formatting.when]
any = ["ppt.selection.text", "ppt.selection.shape", "ppt.selection.picture", "ui.text_input"]

[actions.paste_formatting]
name = "Paste formatting"
priority = "medium"
tags = ["clipboard", "format"]

[actions.paste_formatting.when]
any = ["ppt.selection.text", "ppt.selection.shape", "ppt.selection.picture", "ui.text_input"]

[actions.insert_hyperlink]
name = "Insert hyperlink"
priority = "medium"
tags = ["link"]

[actions.insert_hyperlink.when]
any = ["ppt.selection.text", "ppt.selection.shape", "ppt.selection.picture", "ui.text_input"]

[actions.insert_comment]
name = "Insert comment"
priority = "medium"
tags = ["comment"]

[actions.open_font_dialog]
name = "Open Font dialog"
priority = "suppressed"
tags = ["format", "font"]

[actions.open_font_dialog.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.increase_font_size]
name = "Increase font size"
priority = "medium"
tags = ["format", "font"]

[actions.increase_font_size.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.decrease_font_size]
name = "Decrease font size"
priority = "medium"
tags = ["format", "font"]

[actions.decrease_font_size.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.change_case]
name = "Change selected text case"
priority = "low"
tags = ["format", "font"]

[actions.change_case.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.bold]
name = "Bold text"
priority = "high"
tags = ["format", "font"]

[actions.bold.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.italic]
name = "Italic text"
priority = "high"
tags = ["format", "font"]

[actions.italic.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.underline]
name = "Underline text"
priority = "medium"
tags = ["format", "font"]

[actions.underline.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.subscript]
name = "Subscript text"
priority = "suppressed"
tags = ["format", "font"]

[actions.subscript.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.superscript]
name = "Superscript text"
priority = "suppressed"
tags = ["format", "font"]

[actions.superscript.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.clear_manual_character_formatting]
name = "Clear manual character formatting"
priority = "suppressed"
tags = ["format", "font"]

[actions.clear_manual_character_formatting.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.align_left]
name = "Align text left"
priority = "medium"
tags = ["format", "paragraph"]

[actions.align_left.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.align_center]
name = "Center text"
priority = "medium"
tags = ["format", "paragraph"]

[actions.align_center.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.align_right]
name = "Align text right"
priority = "medium"
tags = ["format", "paragraph"]

[actions.align_right.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.justify_text]
name = "Justify text"
priority = "suppressed"
tags = ["format", "paragraph"]

[actions.justify_text.when]
any = ["ppt.selection.text", "ui.text_input"]

[actions.find_text]
name = "Find text"
priority = "medium"
tags = ["find"]

[actions.replace_text]
name = "Replace text"
priority = "low"
tags = ["find"]

[actions.group_objects]
name = "Group selected objects"
priority = "high"
tags = ["arrange", "shape", "image"]

[actions.group_objects.when]
any = ["ppt.selection.shape", "ppt.selection.picture"]

[actions.ungroup_objects]
name = "Ungroup selected objects"
priority = "medium"
tags = ["arrange", "shape", "image"]

[actions.ungroup_objects.when]
any = ["ppt.selection.shape", "ppt.selection.picture"]

[actions.regroup_objects]
name = "Regroup selected objects"
priority = "suppressed"
tags = ["arrange", "shape", "image"]

[actions.regroup_objects.when]
any = ["ppt.selection.shape", "ppt.selection.picture"]

[actions.bring_forward]
name = "Bring selected object forward"
priority = "medium"
tags = ["arrange", "shape", "image"]

[actions.bring_forward.when]
any = ["ppt.selection.shape", "ppt.selection.picture"]

[actions.send_backward]
name = "Send selected object backward"
priority = "medium"
tags = ["arrange", "shape", "image"]

[actions.send_backward.when]
any = ["ppt.selection.shape", "ppt.selection.picture"]

[actions.rotate_object_clockwise]
name = "Rotate selected object clockwise"
priority = "suppressed"
tags = ["arrange", "shape", "image"]

[actions.rotate_object_clockwise.when]
any = ["ppt.selection.shape", "ppt.selection.picture"]

[actions.rotate_object_counterclockwise]
name = "Rotate selected object counterclockwise"
priority = "suppressed"
tags = ["arrange", "shape", "image"]

[actions.rotate_object_counterclockwise.when]
any = ["ppt.selection.shape", "ppt.selection.picture"]

[actions.play_or_pause_media]
name = "Play or pause selected media"
priority = "medium"
tags = ["media"]

[actions.play_or_pause_media.when]
any = ["ppt.selection.shape", "ppt.selection.picture"]
