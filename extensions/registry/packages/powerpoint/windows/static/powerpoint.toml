version = 3
platform = "windows"
process_name = "POWERPNT.EXE"

[actions]

[actions.new_slide]
cmd = { mods = ["ctrl"], key = "KeyM" }

[actions.new_presentation]
cmd = { mods = ["ctrl"], key = "KeyN" }

[actions.open_presentation]
cmd = { mods = ["ctrl"], key = "KeyO" }

[actions.save_presentation]
cmd = { mods = ["ctrl"], key = "KeyS" }

[actions.save_presentation_as]
cmd = { mods = ["ctrl", "shift"], key = "KeyS" }

[actions.print_presentation]
cmd = { mods = ["ctrl"], key = "KeyP" }

[actions.start_slideshow]
cmd = { mods = [], key = "F5" }

[actions.start_slideshow_from_current]
cmd = { mods = ["shift"], key = "F5" }

[actions.open_draw_tab]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyJ" },
    { key = "KeyI" },
] }

[actions.open_help_tab]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyY" },
    { key = "Key2" },
] }

[actions.change_font_size_from_ribbon]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyH" },
    { key = "KeyF" },
    { key = "KeyS" },
] }

[actions.open_zoom_dialog]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyW" },
    { key = "KeyQ" },
] }

[actions.print_full_page_slides]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyP" },
    { key = "KeyP" },
] }

[actions.select_theme]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyG" },
    { key = "KeyH" },
] }

[actions.select_slide_layout]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyH" },
    { key = "KeyL" },
] }

[actions.toggle_notes_pane]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyW" },
    { key = "KeyP" },
    { key = "KeyN" },
] }

[actions.open_clipboard_pane]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyH" },
    { key = "KeyF" },
    { key = "KeyO" },
] }

[actions.insert_text_box]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyN" },
    { key = "KeyX" },
] }

[actions.insert_embedded_object]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyN" },
    { key = "KeyJ" },
] }

[actions.insert_wordart]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyN" },
    { key = "KeyW" },
] }

[actions.insert_picture_from_device]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyN" },
    { key = "KeyP" },
    { key = "KeyD" },
] }

[actions.insert_shape]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyN" },
    { key = "KeyS" },
    { key = "KeyH" },
] }

[actions.open_selection_pane]
cmd = { sequence = [
    { mods = ["alt"], key = "KeyH" },
    { key = "KeyS" },
    { key = "KeyL" },
    { key = "KeyP" },
] }

[actions.next_slide]
cmd = { mods = [], key = "PageDown" }

[actions.previous_slide]
cmd = { mods = [], key = "PageUp" }

[actions.zoom_out]
cmd = { mods = ["ctrl"], key = "Minus" }

[actions.zoom_to_fit]
cmd = { mods = ["ctrl", "alt"], key = "KeyO" }

[actions.duplicate_slide]
cmd = { mods = ["ctrl", "shift"], key = "KeyD" }

[actions.duplicate_object]
cmd = { mods = ["ctrl"], key = "KeyD" }

[actions.cut_selection]
cmd = { mods = ["ctrl"], key = "KeyX" }

[actions.copy_selection]
cmd = { mods = ["ctrl"], key = "KeyC" }

[actions.paste]
cmd = { mods = ["ctrl"], key = "KeyV" }

[actions.copy_formatting]
cmd = { mods = ["ctrl", "shift"], key = "KeyC" }

[actions.paste_formatting]
cmd = { mods = ["ctrl", "shift"], key = "KeyV" }

[actions.insert_hyperlink]
cmd = { mods = ["ctrl"], key = "KeyK" }

[actions.insert_comment]
cmd = { mods = ["ctrl", "alt"], key = "KeyM" }

[actions.open_font_dialog]
cmd = { mods = ["ctrl"], key = "KeyT" }

[actions.increase_font_size]
cmd = { mods = ["ctrl", "shift"], key = "Period" }

[actions.decrease_font_size]
cmd = { mods = ["ctrl", "shift"], key = "Comma" }

[actions.change_case]
cmd = { mods = ["shift"], key = "F3" }

[actions.bold]
cmd = { mods = ["ctrl"], key = "KeyB" }

[actions.italic]
cmd = { mods = ["ctrl"], key = "KeyI" }

[actions.underline]
cmd = { mods = ["ctrl"], key = "KeyU" }

[actions.subscript]
cmd = { mods = ["ctrl"], key = "Equal" }

[actions.superscript]
