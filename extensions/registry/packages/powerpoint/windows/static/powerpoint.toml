[actions.align_left]
cmd = { mods = ["ctrl"], key = "KeyL" }

[actions.align_center]
cmd = { mods = ["ctrl"], key = "KeyE" }

[actions.align_right]
cmd = { mods = ["ctrl"], key = "KeyR" }

[actions.justify_text]
cmd = { mods = ["ctrl"], key = "KeyJ" }

[actions.find_text]
cmd = { mods = ["ctrl"], key = "KeyF" }

[actions.replace_text]
cmd = { mods = ["ctrl"], key = "KeyH" }

[actions.group_objects]
cmd = { mods = ["ctrl"], key = "KeyG" }

[actions.ungroup_objects]
cmd = { mods = ["ctrl", "shift"], key = "KeyG" }

[actions.regroup_objects]
cmd = { mods = ["ctrl", "shift"], key = "KeyJ" }

[actions.bring_forward]
cmd = { mods = ["ctrl", "shift"], key = "RightBracket" }

[actions.send_backward]
cmd = { mods = ["ctrl", "shift"], key = "LeftBracket" }

[actions.rotate_object_clockwise]
