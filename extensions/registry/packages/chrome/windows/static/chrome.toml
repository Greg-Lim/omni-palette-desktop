# Only cover chrome base shortcuts
# I plan to make 1 more generalize for chrome extensions
# n more for every unique webpage that implements shortcuts

# The architecture of this file is based on ADR/0002_extension_config_design.md

version = 2
platform = "windows"

# --- Application (this entire file represents exactly ONE app id) ---
[app]
id = "chrome"                    # Application ID (unique)
name = "Chrome"                  # Application Name (OS-agnostic)
process_name = "chrome.exe"
default_focus_state = "focused"  # For app that only want to run commands that are in focused

# --- Actions ---
# action_id -> action_name
# action_id + application_id -> action_cmd
[actions]

[actions.new_tab]
name = "New tab"
focus_state = "focused"
action_priority = "high"
cmd = { mods = ["ctrl"], key = "KeyT" }

[actions.close_tab]
name = "Close tab"
focus_state = "focused"
action_priority = "high"
cmd = { mods = ["ctrl"], key = "KeyW" }

[actions.reopen_tab]
name = "Reopen closed tab"
focus_state = "focused"
action_priority = "high"
cmd = { mods = ["ctrl", "shift"], key = "KeyT" }

