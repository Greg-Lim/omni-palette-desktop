version = 3
platform = "windows"
process_name = "chrome.exe"

[actions]

[actions.new_tab]
cmd = { mods = ["ctrl"], key = "KeyT" }

[actions.close_tab]
cmd = { mods = ["ctrl"], key = "KeyW" }

[actions.reopen_tab]
cmd = { mods = ["ctrl", "shift"], key = "KeyT" }

[actions.new_window]
